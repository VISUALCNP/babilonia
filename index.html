<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Club Babilonia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #0b3d0b, #1a1a1a);
      color: white;
      text-align: center;
    }
    header {
      padding: 10px;
      background: rgba(0,0,0,0.6);
    }
    header h1 {
      font-size: 2.5em;
      margin: 5px 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .carousel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 35px; /* más separación entre fotos */
      margin: 30px auto;
      max-width: 1100px;
    }
    .carousel img {
      width: 180px;
      height: 120px;
      object-fit: contain;
      opacity: 0.5;
      transition: transform 0.8s ease, opacity 0.8s ease;
      border-radius: 8px;
      border: 2px solid white;
      flex-shrink: 0;
      display: none; /* ocultas por defecto */
    }
    .carousel img.active {
      transform: scale(1.3); /* solo la activa se agranda */
      opacity: 1;
      z-index: 2;
    }
    .info {
      margin: 15px auto;
      max-width: 400px; /* más compacta */
      background: rgba(255,255,255,0.08);
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.3); /* contorno definido */
      font-size: 0.9em; /* fuente más chica */
    }
    .info h2 {
      margin-bottom: 5px;
      font-size: 1.1em;
      text-decoration: underline;
    }
    .info ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .info li {
      margin: 6px 0;
      font-size: 0.95em;
    }
    .whatsapp {
      margin: 10px auto; /* más abajo */
    }
    .whatsapp a {
      background-color:#25D366;
      color:white;
      padding:8px 25px;
      text-decoration:none;
      border-radius:6px;
      font-size:1.1em;
    }
    footer {
      margin-top: 5px;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Club Babilonia Fútbol</h1>

    <!-- Carrusel -->
    <div class="carousel">
      <img src="1.png" alt="Foto 1">
      <img src="2.png" alt="Foto 2">
      <img src="3.png" alt="Foto 3">
      <img src="4.png" alt="Foto 4">
      <img src="5.png" alt="Foto 5">
      <img src="6.png" alt="Foto 6">
      <img src="7.png" alt="Foto 7">
      <img src="8.png" alt="Foto 8">
        <img src="9.png" alt="Foto 9">
    </div>

    <!-- Sección de servicios -->
    <div class="info">
      <h2>Servicios</h2>
      <ul>
        <li>Canchas de 6 y 8 ⚽⚽⚽</li>
        <li>Cumpleaños 🥳🎈🍰🎁</li>
        <li>Quincho y Asador 🥩🥓</li>
        <li>Bebidas y Comidas 🍻🍔🍕</li>
      </ul>
    </div>

    <!-- Botón WhatsApp -->
    <div class="whatsapp">
      <a href="https://wa.me/3518724698" target="_blank">📱 Consultas por WhatsApp</a>
    </div>
  </header>

  <footer>
    📍 Monseñor Pablo Cabrera 1864 <br>
    📞 Tel: 3518724698 — Turnos y consultas
  </footer>

  <script>
    const images = document.querySelectorAll('.carousel img');
    let blockIndex = 0; // bloque actual (0=1-3, 1=4-6, etc.)
    let activeIndex = 0; // dentro del bloque, cuál está activa

    function showBlock() {
      // ocultar todas
      images.forEach(img => {
        img.style.display = "none";
        img.classList.remove("active");
      });

      // calcular inicio del bloque
      const start = blockIndex * 3;
      const end = start + 3;

      // mostrar las 3 del bloque
      for (let i = start; i < end && i < images.length; i++) {
        images[i].style.display = "block";
      }

      // marcar activa la que corresponde
      const active = start + activeIndex;
      if (active < images.length) {
        images[active].classList.add("active");
      }
    }

    function next() {
      activeIndex++;
      if (activeIndex >= 3 || (blockIndex*3 + activeIndex) >= images.length) {
        // pasar al siguiente bloque
        activeIndex = 0;
        blockIndex = (blockIndex + 1) % Math.ceil(images.length / 3);
      }
      showBlock();
    }

    // inicializar
    showBlock();
    setInterval(next, 3000); // rota cada 3 segundos
  </script>
</body>
</html>
