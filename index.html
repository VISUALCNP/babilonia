<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Club Babilonia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #0b3d0b, #1a1a1a);
      color: white;
      text-align: center;
    }
    header {
      padding: 10px;

      background: rgba(0,0,0,0.6);
    }
    header h1 {
      font-size: 2.0em;
      margin: 0px 0;
      background: linear-gradient(to bottom, #0b3d0b, #1a1a1a);
      text-transform: uppercase;
      letter-spacing: 7px;
    }
    .carousel-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px auto;
      max-width: 1100px;
    }
    .carousel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 35px;
      flex-wrap: wrap;
    }
    .carousel img {
      width: 200px;
      height: 120px;
      object-fit: contain;
      opacity: 0.5;
      transition: transform 0.8s ease, opacity 0.8s ease;
      border-radius: 8px;
      border: 2px solid white;
      flex-shrink: 0;
      display: none;
      cursor: pointer;
    }
    .carousel img.active {
      transform: scale(1.3);
      opacity: 1;
      z-index: 2;
    }
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      color: white;
      border: none;
      font-size: 2.5em;
      padding: 0;
      cursor: pointer;
    }
    .arrow.left { left: 20px; }
    .arrow.right { right: 20px; }
    .info {
      margin: 3px auto;
      max-width: 450px;
      background: rgba(255,255,255,0.05);
      padding: 1px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 0.9em;
    }
    .info h2 {
      margin-bottom: 15px;
      font-size: 1.99em;
      text-decoration: underline;
    }
    .info ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .info li {
      margin: 16px 0;
      font-size: 1.25em;
    }
    .whatsapp {
      margin: 18px auto;
    }
    .whatsapp a {
      background-color:#25D366;
      color:white;
      padding:6px 15px;
      text-decoration:none;
      border-radius:12px;
      font-size:1.1em;
    }

  footer {
  margin-top: 3px;
  padding: 14px 0;       /* menos padding */
  background: linear-gradient(to bottom, #0b3d0b, #1a1a1a);
  --background: linear-gradient(to right, #000000, #0b3d0b);
  font-size: 0.95em;
  width: 100%;          /* ocupa todo el ancho */
  text-align: center;
}


    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border: 3px solid white;
      border-radius: 10px;
    }
    /* Ajustes para móviles */
    @media (max-width: 600px) {
      .carousel img {
        width: 100px;
        height: 70px;
      }
      .arrow {
        font-size: 1.5em;
      }
      .info {
        max-width: 95%;
        font-size: 0.85em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Club Babilonia Fútbol</h1>
    <div class="carousel-container">
      <button class="arrow left">❮</button>
      <div class="carousel">
        <img src="1.png" alt="Foto 1">
        <img src="2.png" alt="Foto 2">
        <img src="3.png" alt="Foto 3">
        <img src="4.png" alt="Foto 4">
        <img src="5.png" alt="Foto 5">
        <img src="6.png" alt="Foto 6">
        <img src="7.png" alt="Foto 7">
        <img src="8.png" alt="Foto 8">
        <img src="9.png" alt="Foto 9">
        <img src="10.png" alt="Foto 10">
        <img src="11.png" alt="Foto 11">
        <img src="12.png" alt="Foto 12">
      </div>
      <button class="arrow right">❯</button>
    </div>

    <div class="info">
      <h2>Servicios que ofrecemos</h2>
      <ul>
        <li>Canchas de 6 y 8 ⚽⚽⚽ - Quincho y Asador 🥩🥓</li>
        <li>Cumpleaños 🥳🎈🍰🎁 - Bebidas y Comidas 🍻🍔🍕</li>
      </ul>
    </div>

    <div class="whatsapp">
      <a href="https://wa.me/3518724698" target="_blank">📱 Consultas por WhatsApp</a>
    </div>
  </header>

  <footer>
    📍 Monseñor Pablo Cabrera 1864 <br>
    📞 Tel: 3518724698 — Turnos y consultas
  </footer>

  <div class="modal" id="modal">
    <img id="modalImg" src="" alt="Imagen ampliada">
  </div>

  <script>
    const images = document.querySelectorAll('.carousel img');
    const leftArrow = document.querySelector('.arrow.left');
    const rightArrow = document.querySelector('.arrow.right');
    let blockIndex = 0;
    let activeIndex = 0;

    function showBlock() {
      images.forEach(img => {
        img.style.display = "none";
        img.classList.remove("active");
      });

      const start = blockIndex * 3;
      const end = start + 3;

      for (let i = start; i < end && i < images.length; i++) {
        images[i].style.display = "block";
      }

      const active = start + activeIndex;
      if (active < images.length) {
        images[active].classList.add("active");
      }
    }

    function next() {
      activeIndex++;
      if (activeIndex >= 3 || (blockIndex*3 + activeIndex) >= images.length) {
        activeIndex = 0;
        blockIndex = (blockIndex + 1) % Math.ceil(images.length / 3);
      }
      showBlock();
    }

    function prevBlock() {
      blockIndex = (blockIndex - 1 + Math.ceil(images.length / 3)) % Math.ceil(images.length / 3);
      activeIndex = 0;
      showBlock();
    }

    function nextBlock() {
      blockIndex = (blockIndex + 1) % Math.ceil(images.length / 3);
      activeIndex = 0;
      showBlock();
    }

    leftArrow.addEventListener('click', prevBlock);
    rightArrow.addEventListener('click', nextBlock);

    showBlock();
    setInterval(next, 3000); // rotación automática

    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");

    images.forEach(img => {
      img.addEventListener("click", () => {
        modal.style.display = "flex";
        modalImg.src = img.src;
      });
    });

    modal.addEventListener("click", () => {
      modal.style.display = "none";
    });
  </script>
</body>
</html>
